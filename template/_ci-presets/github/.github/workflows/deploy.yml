name: Deploy migraciones

# Al mergear/pushear:
#   develop -> aplica migraciones al proyecto de STAGING
#   main    -> aplica migraciones al proyecto de PRODUCCIÓN
#
# Cada entorno es un proyecto Supabase distinto. Configurá los secrets por
# GitHub Environment (Settings -> Environments -> staging / production):
#   SUPABASE_ACCESS_TOKEN   (personal access token de tu cuenta)
#   SUPABASE_DB_PASSWORD    (password de la base de ESE proyecto)
#   SUPABASE_PROJECT_ID     (project-ref de ESE proyecto)
on:
  push:
    branches: [main, develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Mapea la branch al Environment correcto (y a sus secrets).
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link al proyecto del entorno
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      # Buena práctica: ver qué se va a aplicar antes de aplicarlo (queda en los logs).
      - name: Previsualizar migraciones pendientes
        run: supabase db push --dry-run

      - name: Aplicar migraciones
        run: supabase db push
