name: Deploy migrations

# On merge/push:
#   develop -> applies migrations to the STAGING project
#   main    -> applies migrations to the PRODUCTION project
#
# Each environment is a separate Supabase project. Configure the secrets per
# GitHub Environment (Settings -> Environments -> staging / production):
#   SUPABASE_ACCESS_TOKEN   (personal access token of your account)
#   SUPABASE_DB_PASSWORD    (database password for THAT project)
#   SUPABASE_PROJECT_ID     (project-ref of THAT project)
on:
  push:
    branches: [main, develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Maps the branch to the correct Environment (and its secrets).
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link to the environment's project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      # Best practice: review what will be applied before applying it (kept in the logs).
      - name: Preview pending migrations
        run: supabase db push --dry-run

      - name: Apply migrations
        run: supabase db push
