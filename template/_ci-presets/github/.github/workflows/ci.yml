name: CI

# Runs on every PR to main or develop:
#  - Spins up a clean database and applies ALL migrations (verifies they're not broken).
#  - Verifies the committed types are in sync with the schema.
on:
  pull_request:
    branches: [main, develop]

jobs:
  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      # Applies all migrations on a clean Postgres database.
      - run: supabase db start

      # Fails if generated types don't match the schema (someone forgot `npm run db:types`).
      - name: Verify types are up to date
        run: |
          supabase gen types typescript --local > src/lib/supabase/database.types.ts
          if ! git diff --ignore-space-at-eol --exit-code --quiet src/lib/supabase/database.types.ts; then
            echo "::error::Types are out of date. Run 'npm run db:types' and commit the result."
            git diff src/lib/supabase/database.types.ts
            exit 1
          fi
