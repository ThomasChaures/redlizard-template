# GitLab CI — Supabase migration deploys.
#
#   develop -> STAGING project
#   main    -> PRODUCTION project
#
# Set the variables in Settings -> CI/CD -> Variables, scoped per environment
# (protected/masked as appropriate):
#   SUPABASE_ACCESS_TOKEN   (personal access token of your Supabase account)
#   SUPABASE_DB_PASSWORD    (database password for THAT project, mark it as Masked)
#   SUPABASE_PROJECT_ID     (project-ref of THAT project)

image: node:20

stages:
  - validate
  - deploy

# Validates that migrations apply on a clean database and that types are current.
validate:migrations:
  stage: validate
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
  script:
    - npm ci
    - npx supabase db start
    - npx supabase gen types typescript --local > /tmp/types.gen.ts
    - diff -q /tmp/types.gen.ts src/lib/supabase/database.types.ts || (echo "Types out of date: run 'npm run db:types'"; exit 1)
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

.deploy: &deploy
  stage: deploy
  script:
    - npm ci
    - npx supabase link --project-ref "$SUPABASE_PROJECT_ID"
    - npx supabase db push --dry-run
    - npx supabase db push

deploy:staging:
  <<: *deploy
  environment: staging
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

deploy:production:
  <<: *deploy
  environment: production
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
