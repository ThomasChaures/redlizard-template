# GitLab CI — deploy de migraciones de Supabase.
#
#   develop -> proyecto de STAGING
#   main    -> proyecto de PRODUCCIÓN
#
# Cargá las variables en Settings -> CI/CD -> Variables, scopeadas por environment
# (o protegidas/enmascaradas según corresponda):
#   SUPABASE_ACCESS_TOKEN   (personal access token de tu cuenta Supabase)
#   SUPABASE_DB_PASSWORD    (password de la base de ESE proyecto, marcala como Masked)
#   SUPABASE_PROJECT_ID     (project-ref de ESE proyecto)

image: node:20

stages:
  - validate
  - deploy

# Valida que las migraciones apliquen en una base limpia y que los tipos estén al día.
validate:migrations:
  stage: validate
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
  script:
    - npm ci
    - npx supabase db start
    - npx supabase gen types typescript --local > /tmp/types.gen.ts
    - diff -q /tmp/types.gen.ts src/lib/supabase/database.types.ts || (echo "Tipos desactualizados: corré 'npm run db:types'"; exit 1)
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

.deploy: &deploy
  stage: deploy
  script:
    - npm ci
    - npx supabase link --project-ref "$SUPABASE_PROJECT_ID"
    - npx supabase db push --dry-run
    - npx supabase db push

deploy:staging:
  <<: *deploy
  environment: staging
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

deploy:production:
  <<: *deploy
  environment: production
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
