# Bitbucket Pipelines — Supabase migration deploys.
#
#   develop -> STAGING project
#   main    -> PRODUCTION project
#
# Set the variables in each Bitbucket Deployment
# (Repository settings -> Deployments -> staging / production):
#   SUPABASE_ACCESS_TOKEN   (personal access token of your Supabase account)
#   SUPABASE_DB_PASSWORD    (database password for THAT project, mark it as Secured)
#   SUPABASE_PROJECT_ID     (project-ref of THAT project)
#
# The Supabase CLI is already a devDependency: it's used via `npx supabase`.

image: node:20

definitions:
  services:
    docker:
      memory: 3072
  steps:
    - step: &deploy-migrations
        name: Deploy migrations
        caches:
          - node
        script:
          - npm ci
          - npx supabase link --project-ref "$SUPABASE_PROJECT_ID"
          - npx supabase db push --dry-run
          - npx supabase db push

pipelines:
  branches:
    develop:
      - step:
          <<: *deploy-migrations
          name: "Migrations -> staging"
          deployment: staging
    main:
      - step:
          <<: *deploy-migrations
          name: "Migrations -> production"
          deployment: production

  pull-requests:
    "**":
      - step:
          name: Validate migrations (clean database)
          services:
            - docker
          caches:
            - node
          script:
            - npm ci
            - npx supabase db start
            - npx supabase gen types typescript --local > /tmp/types.gen.ts
            - diff -q /tmp/types.gen.ts src/lib/supabase/database.types.ts || (echo "Types out of date: run 'npm run db:types'"; exit 1)
