# Configuración del proyecto local de Supabase CLI.
# Ejecutá `supabase link --project-ref <ref>` para asociarlo a tu proyecto remoto.
project_id = "{{PROJECT_NAME}}"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# URL del sitio para enlaces de confirmación/recuperación.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/confirm"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_confirmations = true
